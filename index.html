<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User testing of final prototype for CLNx website redesign</title>
    <style>
        :root {
            --uoft-blue: #002A5C;
            --uoft-light-blue: #E1E8F2;
            --sidebar-bg: #1A2740;
            --hover-blue: #00449E;
            --shortlist-bg: #DCEAF5;
            --btn-blue: #003366;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #F4F5F7;
            height: 100%;
        }

        /* --- Welcome Screen & Consent --- */
        #welcome-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--uoft-blue);
            color: white;
            text-align: center;
        }

        .login-box {
            background: white;
            color: black;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 450px;
            text-align: left;
        }

        .login-box h2 {
            margin-top: 0;
            color: var(--uoft-blue);
            text-align: center;
        }
        
        .login-box p.subtitle {
            text-align: center;
            color: #555;
            margin-bottom: 25px;
        }

        .login-box input[type="text"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0 20px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .consent-container {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 25px;
            font-size: 14px;
            color: #333;
        }

        .consent-container input {
            margin-top: 3px;
            cursor: pointer;
        }

        .login-box button {
            background-color: var(--uoft-blue);
            color: white;
            border: none;
            padding: 12px 20px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }
